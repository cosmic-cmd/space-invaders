<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SPACE INVADERS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>SYSTEM STATUS: ONLINE</h1>
    <div id="game-container">
        <div id="system-overlay">
            <div class="terminal-window" id="boot-screen">
                <h2 style="color: #ff0055;">TOP AGENTS - DATABASE</h2>
                <div id="leaderboard-data" style="margin: 15px 0; max-height: 200px; overflow-y: auto;">
                    LOADING ENCRYPTED DATA...
                </div>
                <hr style="border: 0.5px solid #00eeff;">
                <h3>INITIALIZE NEW AGENT</h3>
                <input type="text" id="agent-input" placeholder="ENTER ID..." maxlength="10">
                <br>
                <button onclick="bootSystem()">BOOT ENGINE</button>
            </div>
        </div>

        <div class="hud">
            <div>AGENT: <span id="agent-id">---</span></div>
            <div>LVL: <span id="level-val">01</span></div>
            <div>WEAPON: <span id="weapon-status">CALIBRATING...</span></div>
            <div>SCORE: <span id="score-val">0000</span></div>
        </div>
        <canvas id="invadersCanvas" width="800" height="600"></canvas>
    </div>
    <script src="invaders.js"></script>
</body>

</html>
